output_dir: output/case_bank_stratified_fewshot_64_64
model_output_dir: output/forecasting_stratified_fewshot_64_64
random_seed: 7
cell_uid_prefix: cell
adapter_cache: true
nominal_capacity_window: 5
soh_skip_initial_cycles: 0
tju_repair_soh_outliers: true
soh_outlier_local_window: 7
soh_outlier_relative_floor: 0.60
soh_outlier_min_capacity_ah: 0.0001

datasets:
  xjtu:
    enabled: true
    root: datasets/xjtu_dataset
    exclude_raw_cell_id_patterns:
      - "Sim_satellite_*"
  tju:
    enabled: true
    root: datasets/TJU_dataset
    tju_repair_soh_outliers: true
    soh_outlier_local_window: 7
    soh_outlier_relative_floor: 0.60
    soh_outlier_min_capacity_ah: 0.0001
    exclude_folders:
      - Dataset_3_NCM_NCA_battery
  hust:
    enabled: true
    root: datasets/HUST_dataset
  mit:
    enabled: true
    root: datasets/MIT_dataset

split:
  strategy: stratified-fewshot-by-condition
  random_seed: 7
  exclude_chemistry_families:
    - Blend
  exclude_file_path_contains:
    - Dataset_3_NCM_NCA_battery
  min_query_cells_per_stratum: 1
  large_train_cells: 4
  large_val_cells: 2
  large_support_cells: 2
  medium_train_cells: 2
  medium_val_cells: 1
  medium_support_cells: 1
  small_train_cells: 1
  small_val_cells: 1
  small_support_cells: 1
  tiny_train_cells: 1
  tiny_val_cells: 0
  tiny_support_cells: 1
  pair_train_cells: 1
  pair_val_cells: 0
  pair_support_cells: 0

memory:
  lookback_length: 64
  prediction_length: 64
  stride: 10
  target_type: delta_soh
  token_normalization: cell_relative
  slope_window: 5
  derived_features:
    rolling_window: 5
    spectral_window: 16
    spectral_columns:
      - voltage_mean
      - temp_mean
      - current_mean
  token_features:
    - soh
    - soh_diff_1
    - soh_slope_5
    - voltage_mean
    - voltage_range
    - voltage_mean_diff_1
    - voltage_mean_std_5
    - voltage_mean_fft_entropy_16
    - temp_mean
    - temp_range
    - temp_mean_diff_1
    - temp_mean_std_5
    - temp_mean_fft_entropy_16
    - current_abs_mean
    - current_mean_diff_1
    - current_mean_std_5
    - current_mean_fft_entropy_16
    - cc_time
    - cv_time
    - charge_throughput_delta_1
    - discharge_throughput_delta_1
    - energy_charge_delta_1
    - energy_discharge_delta_1

features:
  q_grid_size: 100
  partial_charge_segments: 50
  rolling_median_window: 5
  normalize_using: source_train
  use_qv_feature_map: true
  use_partial_charge_curve: true
  use_physics_features: true
  future_ops_mode: known

retrieval:
  retrieval_feature_config_path: configs/retrieval_features.yaml
  db_splits: ["source_train"]
  metric: cosine
  top_m: 50
  top_k: 5
  same_cell_policy: exclude
  allow_cross_chemistry: true
  retrieval_temperature: 0.1
  stage1_embedding: handcrafted
  use_mmr: true
  mmr_lambda: 0.75
  max_neighbors_per_cell: 2

model:
  hidden_dim: 128
  dropout: 0.1
  meta_embedding_dim: 16
  use_qv_encoder: true
  use_partial_charge_encoder: true
  use_pairwise_branch: true
  use_moe_branch: true
  use_future_ops_encoder: true
  chemistry_families:
    - LFP
    - NCM
    - NCA
  expert_names:
    - slow_linear
    - accelerating
    - high_polarization
    - curve_polarization_expert
  top_k_experts: 2
  router_type: semantic_hierarchical
  fusion_router_type: grouped_additive
  residual_decoder_type: smooth_basis
  residual_basis_points: 8
  residual_output_mode: hybrid_rate
  residual_direct_fraction: 0.35
  residual_terminal_max_abs: 0.045
  residual_terminal_profile_power: 1.35
  residual_terminal_step_max_abs: 0.001
  residual_max_abs: 0.002
  residual_confidence_floor: 0.20
  residual_reference_dispersion_scale: 0.004
  residual_reference_agreement_floor: 0.05
  base_trend_blend: 0.60
  residual_stage_floor: 0.05
  residual_stage_mid_soh: 0.975
  residual_stage_sharpness: 70.0
  residual_smoothing_window: 9
  residual_max_step_abs: 0.00025
  residual_opposition_scale: 0.20
  residual_trend_cap_fraction: 0.25
  residual_trend_cap_floor: 0.00005
  residual_deployment_max_abs: 0.002

train_base:
  enabled: true

generate_oof_baseline:
  enabled: true
  num_folds: 5
  epochs: 3
  lr: 0.0005

train_residual_experts:
  enabled: true
  lr: 0.0005
  epochs: 20
  patience: 6

loss:
  criterion: weighted_mse
  horizon_end_weight: 1.35
  forecast: 1.0
  pairwise: 0.5
  residual: 1.0
  route_kl: 0.01
  monotonic: 0.05
  smoothness: 0.05
  residual_smoothness: 0.50
  residual_total_variation: 0.25
  residual_magnitude: 0.05
  late_horizon_fraction: 0.35
  late_forecast: 0.40
  terminal_forecast: 0.30
  late_residual: 0.25
  under_degradation: 0.03
  expert_balance: 0.01
  retrieval_consistency: 0.02
  fusion_regularization: 0.0
  monotonic_epsilon: 0.0005

train:
  train_splits: ["source_train"]
  val_splits: ["source_val"]
  batch_size: 16
  epochs: 25
  lr: 0.001
  weight_decay: 0.0001
  patience: 8
  grad_clip_norm: 1.0
  device: mps
  num_workers: 0

fewshot:
  enabled: true
  support_splits: ["target_support"]
  lr: 0.0003
  epochs: 15
  patience: 5

experiments:
  feature_validation:
    enabled: true
    output_dir: output/experiments/feature_validation
    run_ridge: true
    run_random_forest: true
    run_small_mlp: false
    use_target_query_only_for_final_report: true
    num_plot_examples: 20
  retrieval_validation:
    enabled: true
    output_dir: output/experiments/retrieval_validation
    num_queries: 100
    num_plot_queries: 20
    compare_random_baseline: true
    run_rag_only_sanity: true

eval:
  test_splits: ["target_query"]
  save_predictions: true
  save_router_contributions: true
  save_retrieval_case_report: true
  plot_examples: true
  num_plot_examples: 20
